    <div style='position:fixed;top:14px;right:14px;background:rgba(10,22,40,0.93);border:1px solid #1B6CA8;border-radius:8px;padding:10px 14px;z-index:9999;pointer-events:none;min-width:130px;'><div style='font-size:11px;font-weight:bold;color:#0D9E8F;margin-bottom:5px;'>Node Types</div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:11px;height:11px;border-radius:50%;background:#4C9BE8;flex-shrink:0'></div><span style='font-size:11px;color:#e0e0e0'>Anime</span></div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:11px;height:11px;border-radius:50%;background:#F4A261;flex-shrink:0'></div><span style='font-size:11px;color:#e0e0e0'>Genre</span></div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:11px;height:11px;border-radius:50%;background:#2A9D8F;flex-shrink:0'></div><span style='font-size:11px;color:#e0e0e0'>Studio</span></div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:11px;height:11px;border-radius:50%;background:#E76F51;flex-shrink:0'></div><span style='font-size:11px;color:#e0e0e0'>Source</span></div><div style='font-size:11px;font-weight:bold;color:#0D9E8F;margin:7px 0 5px;'>Relations</div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:14px;height:3px;background:#E63946;flex-shrink:0;border-radius:2px'></div><span style='font-size:11px;color:#e0e0e0'>SEQUEL</span></div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:14px;height:3px;background:#457B9D;flex-shrink:0;border-radius:2px'></div><span style='font-size:11px;color:#e0e0e0'>PREQUEL</span></div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:14px;height:3px;background:#A8DADC;flex-shrink:0;border-radius:2px'></div><span style='font-size:11px;color:#e0e0e0'>SIDE_STORY</span></div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:14px;height:3px;background:#F4A261;flex-shrink:0;border-radius:2px'></div><span style='font-size:11px;color:#e0e0e0'>SPIN_OFF</span></div><div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:14px;height:3px;background:#8338EC;flex-shrink:0;border-radius:2px'></div><span style='font-size:11px;color:#e0e0e0'>ALTERNATIVE</span></div></div>
<script>
(function () {
    var D = 55; // min center-to-center distance

    function resolveCollisions(pos, ids) {
        for (var it = 0; it < 150; it++) {
            var moved = false;
            for (var i = 0; i < ids.length; i++) {
                for (var j = i + 1; j < ids.length; j++) {
                    var a = pos[ids[i]], b = pos[ids[j]];
                    var dx = b.x - a.x, dy = b.y - a.y;
                    var d  = Math.sqrt(dx*dx + dy*dy);
                    if (d < D && d > 0.01) {
                        var push = (D - d) / 2 + 1;
                        var nx2 = dx/d*push, ny2 = dy/d*push;
                        pos[ids[i]].x -= nx2; pos[ids[i]].y -= ny2;
                        pos[ids[j]].x += nx2; pos[ids[j]].y += ny2;
                        moved = true;
                    }
                }
            }
            if (!moved) break;
        }
        ids.forEach(function (id) { network.moveNode(id, pos[id].x, pos[id].y); });
    }

    // Resolve collisions only for the dragged node and its nearby neighbours.
    // This runs on every drag frame so it must be fast - limit to nodes
    // within 2*D of the dragged node rather than the full graph.
    function resolveNear(draggedId) {
        var all = network.getPositions();
        var dragged = all[draggedId];
        if (!dragged) return;
        var nearby = [draggedId];
        var ids = Object.keys(all);
        for (var k = 0; k < ids.length; k++) {
            if (ids[k] === draggedId) continue;
            var dx = all[ids[k]].x - dragged.x;
            var dy = all[ids[k]].y - dragged.y;
            if (Math.sqrt(dx*dx + dy*dy) < D * 3) nearby.push(ids[k]);
        }
        if (nearby.length < 2) return;
        var sub = {};
        for (var n = 0; n < nearby.length; n++) sub[nearby[n]] = { x: all[nearby[n]].x, y: all[nearby[n]].y };
        resolveCollisions(sub, nearby);
    }

    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
            if (typeof network === "undefined") return;

            // Initial pass on load
            var pos = network.getPositions();
            var ids = Object.keys(pos);
            resolveCollisions(pos, ids);
            network.fit();

            // Real-time collision during drag (throttled to every 30ms)
            var lastDrag = 0;
            network.on("dragging", function (params) {
                if (!params.nodes || params.nodes.length === 0) return;
                var now = Date.now();
                if (now - lastDrag < 30) return;
                lastDrag = now;
                resolveNear(String(params.nodes[0]));
            });

            // Final full pass on release to clean up anything missed
            network.on("dragEnd", function (params) {
                if (!params.nodes || params.nodes.length === 0) return;
                var pos2 = network.getPositions();
                var ids2 = Object.keys(pos2);
                resolveCollisions(pos2, ids2);
            });
        }, 300);
    });
})();
</script></body>
